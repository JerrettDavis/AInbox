name: Release AInbox

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-native:
    name: Build native package (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            artifact_name: mailbox-linux-x86_64
            binary_path: target/release/mailbox
            archive_name: mailbox-linux-x86_64.tar.gz
          - label: macos-x86_64
            runner: macos-15-intel
            artifact_name: mailbox-macos-x86_64
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-x86_64.tar.gz
          - label: macos-aarch64
            runner: macos-14
            artifact_name: mailbox-macos-aarch64
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-aarch64.tar.gz
          - label: windows-x86_64
            runner: windows-latest
            artifact_name: mailbox-windows-x86_64
            binary_path: target/release/mailbox.exe
            archive_name: mailbox-windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp "${{ matrix.binary_path }}" "dist/mailbox"
          tar -czf "${{ matrix.archive_name }}" -C dist mailbox

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist\\mailbox.exe"
          Compress-Archive -Path "dist\\mailbox.exe" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}

  publish-release:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum mailbox-* > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/mailbox-*
            release-assets/SHA256SUMS.txt
          generate_release_notes: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI packages to GHCR
        env:
          TAG: ${{ github.ref_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          cd release-assets
          for file in mailbox-*; do
            [ -f "$file" ] || continue
            base="$file"
            media_type="application/octet-stream"
            if [[ "$file" == *.tar.gz ]]; then
              base="${file%.tar.gz}"
              media_type="application/gzip"
            elif [[ "$file" == *.zip ]]; then
              base="${file%.zip}"
              media_type="application/zip"
            fi

            package="ghcr.io/${OWNER_LC}/ainbox-${base}"
            oras push "${package}:${TAG}" \
              "${file}:${media_type}" \
              --artifact-type application/vnd.ainbox.binary.v1+archive
            oras push "${package}:latest" \
              "${file}:${media_type}" \
              --artifact-type application/vnd.ainbox.binary.v1+archive
          done
