name: Release AInbox

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  build-native:
    name: Build native package (${{ matrix.label }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            binary_path: target/release/mailbox
            archive_name: mailbox-linux-x86_64.tar.gz
          - label: macos-x86_64
            runner: macos-15-intel
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-x86_64.tar.gz
          - label: macos-aarch64
            runner: macos-14
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-aarch64.tar.gz
          - label: windows-x86_64
            runner: windows-latest
            binary_path: target/release/mailbox.exe
            archive_name: mailbox-windows-x86_64.zip

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/mailbox"
          tar -czf "${{ matrix.archive_name }}" -C dist mailbox

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist\\mailbox.exe"
          Compress-Archive -Path "dist\\mailbox.exe" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  publish-release:
    name: Publish release assets
    needs:
      - release-please
      - build-native
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum mailbox-* > SHA256SUMS.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release-assets/mailbox-*
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI packages to GHCR
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          cd release-assets
          for file in mailbox-*; do
            [ -f "$file" ] || continue
            base="$file"
            media_type="application/octet-stream"
            if [[ "$file" == *.tar.gz ]]; then
              base="${file%.tar.gz}"
              media_type="application/gzip"
            elif [[ "$file" == *.zip ]]; then
              base="${file%.zip}"
              media_type="application/zip"
            fi

            package="ghcr.io/${OWNER_LC}/ainbox-${base}"
            oras push "${package}:${TAG}" \
              "${file}:${media_type}" \
              --artifact-type application/vnd.ainbox.binary.v1+archive

            if [[ "$TAG" != *-* ]]; then
              oras push "${package}:latest" \
                "${file}:${media_type}" \
                --artifact-type application/vnd.ainbox.binary.v1+archive
            fi
          done
