name: Release AInbox

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.prepare.outputs.released }}
      tag_name: ${{ steps.prepare.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare release files
        id: prepare
        run: python scripts/release_prepare.py

      - name: Configure Git
        if: steps.prepare.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release metadata
        if: steps.prepare.outputs.released == 'true'
        run: |
          git add Cargo.toml Cargo.lock ainbox/__init__.py .claude-plugin/plugin.json .claude-plugin/marketplace.json .github/plugin/plugin.json .github/plugin/marketplace.json plugins/*/.claude-plugin/plugin.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "chore(release): ${{ steps.prepare.outputs.tag }} [skip ci]"
          fi

      - name: Create release tag
        if: steps.prepare.outputs.released == 'true'
        run: |
          case "${{ steps.prepare.outputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid SemVer tag: ${{ steps.prepare.outputs.tag }}" >&2; exit 1 ;;
          esac
          if git rev-parse "${{ steps.prepare.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.prepare.outputs.tag }} already exists locally."
          else
            git tag "${{ steps.prepare.outputs.tag }}"
          fi

      - name: Push release commit and tag
        if: steps.prepare.outputs.released == 'true'
        run: |
          git push origin HEAD:refs/heads/main
          git push origin "${{ steps.prepare.outputs.tag }}"

  build-native:
    name: Build native package (${{ matrix.label }})
    needs: prepare-release
    if: always() && (needs.prepare-release.outputs.release_created == 'true' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            binary_path: target/release/mailbox
            archive_name: mailbox-linux-x86_64.tar.gz
          - label: macos-x86_64
            runner: macos-15-intel
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-x86_64.tar.gz
          - label: macos-aarch64
            runner: macos-14
            binary_path: target/release/mailbox
            archive_name: mailbox-macos-aarch64.tar.gz
          - label: windows-x86_64
            runner: windows-latest
            binary_path: target/release/mailbox.exe
            archive_name: mailbox-windows-x86_64.zip

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.prepare-release.outputs.tag_name }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/mailbox"
          tar -czf "${{ matrix.archive_name }}" -C dist mailbox

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "dist\\mailbox.exe"
          Compress-Archive -Path "dist\\mailbox.exe" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  publish-release:
    name: Publish release assets
    needs:
      - prepare-release
      - build-native
    if: always() && needs.build-native.result == 'success' && (needs.prepare-release.outputs.release_created == 'true' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.prepare-release.outputs.tag_name }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum mailbox-* > SHA256SUMS.txt

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            release-assets/mailbox-*
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish OCI packages to GHCR
        run: |
          OWNER_LC="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          cd release-assets
          for file in mailbox-*; do
            [ -f "$file" ] || continue
            base="$file"
            media_type="application/octet-stream"
            if [[ "$file" == *.tar.gz ]]; then
              base="${file%.tar.gz}"
              media_type="application/gzip"
            elif [[ "$file" == *.zip ]]; then
              base="${file%.zip}"
              media_type="application/zip"
            fi

            package="ghcr.io/${OWNER_LC}/ainbox-${base}"
            oras push "${package}:${TAG}" \
              "${file}:${media_type}" \
              --artifact-type application/vnd.ainbox.binary.v1+archive

            if [[ "$TAG" != *-* ]]; then
              oras push "${package}:latest" \
                "${file}:${media_type}" \
                --artifact-type application/vnd.ainbox.binary.v1+archive
            fi
          done
