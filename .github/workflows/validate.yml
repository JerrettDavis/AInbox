name: Validate AInbox

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-native-cli:
    name: Test native CLI (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: mailbox-linux-x86_64.tar.gz
          - runner: macos-15-intel
            asset_name: mailbox-macos-x86_64.tar.gz
          - runner: macos-14
            asset_name: mailbox-macos-aarch64.tar.gz
          - runner: windows-latest
            asset_name: mailbox-windows-x86_64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package Unix archive
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/mailbox dist/mailbox
          tar -czf "${{ matrix.asset_name }}" -C dist mailbox

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/release/mailbox.exe" "dist\mailbox.exe"
          Compress-Archive -Path "dist\mailbox.exe" -DestinationPath "${{ matrix.asset_name }}" -Force

      - name: Smoke test Unix installer
        if: runner.os != 'Windows'
        run: |
          export AINBOX_ARCHIVE_PATH="$PWD/${{ matrix.asset_name }}"
          export AINBOX_INSTALL_DIR="$PWD/.ainbox-bin"
          bash scripts/install.sh
          "$PWD/.ainbox-bin/mailbox" --version

      - name: Smoke test Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:AINBOX_ARCHIVE_PATH = "$PWD\${{ matrix.asset_name }}"
          $env:AINBOX_INSTALL_DIR = "$PWD\.ainbox-bin"
          .\scripts\install.ps1
          & "$PWD\.ainbox-bin\mailbox.exe" --version

  test-cli-and-plugin:
    name: Test CLI and plugin manifests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run test suite
        run: python -m unittest discover -s tests -v

  validate-json-manifests:
    name: Validate manifest JSON
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse manifest files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path(".claude-plugin/plugin.json"),
              Path(".claude-plugin/marketplace.json"),
              Path(".github/plugin/plugin.json"),
              Path(".github/plugin/marketplace.json"),
          ]

          for path in files:
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
              print(f"validated {path}")
          PY
